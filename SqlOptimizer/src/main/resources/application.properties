spring.application.name=SqlOptimizer
server.port=8080

# Spring Boot Actuator Configuration (Health check endpoint: /actuator/health)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Spring AI Ollama Configuration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=deepseek-r1:8b
spring.ai.ollama.chat.options.temperature=0.3

# Timeout Handling for HTTP client calls to Ollama (in milliseconds)
spring.mvc.async.request-timeout=300000

# PostgreSQL Configuration (Placeholder if parsing directly or verifying metadata)
spring.datasource.url=jdbc:postgresql://localhost:5432/sql_optimizer
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver